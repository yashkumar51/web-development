<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css float & clear</title>
    <style>
        .card1{
            padding: 10px;
            background-color: blanchedalmond;
            text-align:left;
            color: black;
            padding: 2px;
            border:2px solid black;
        }
          .card2{
            padding: 10px;
            background-color: lightgoldenrodyellow;
            text-align:left;
            color: black;
            padding : 2px;
            border:2px solid black;
          }
            .card3{
            padding: 10px;
            background-color: rgb(25, 128, 25);
            text-align:left;
            color: black;
            padding: 2px;
            border:2px solid black;
            }
            .card:nth-child(2){
                background-color:aqua;
                clear:both;
            }
            .img{
                float:left
            }
    </style>
</head>
<body>
    <div class="cards"></div>
    <img src="https://picjumbo.com/beautiful-beach-free-image-after-sunset-sky/ " alt="" width="230">
    <div class="card">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Illo neque doloremque sit minima recusandae, temporibus totam atque est nam dicta quis nobis ad vel illum assumenda nesciunt unde quo ipsum harum hic.</p>    </div>
    <div class="card1">Card1</div>
    <div class="card2">Card2</div>
    <div class="card3">Card3</div>
</body>
</html>
