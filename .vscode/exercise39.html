<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS document</title>
    <style>
        .container{
            border: 2px solid red;
            display: grid;
            grid-template-columns: [phela] 120px [dushra]100px[t];
            grid-template-rows: 100px 100px 100px;
            grid-template-areas: "nav nav nav";
        }
        .items{
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }
        .items-4{
               grid-column: doshra/t;
               grid-row: 1/2;
        }
        .items-1{
            grid-column: 1/2;
            grid-row: 1/2;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="items items-1">1</div>
    <div class="items">2</div>
    <div class="items">3</div>
    <div class="items">4</div>
    </div>
</body>
</html>
